<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>GHL Training Documentation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="GoHighLevel Training for Sales & Marketing Operations">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #175ddc;
    }

    .app-name-link img {
      width: 150px;
    }

    /* Hide bullet points to make the menu look modern */
    .sidebar ul {
      list-style-type: none !important;
      padding-left: 15px;
    }

    .sidebar>.sidebar-nav>ul {
      padding-left: 0;
    }

    .sidebar-nav li strong {
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
      font-size: 1.1em;
      color: #333;
    }

    .app-sub-sidebar li:before {
      display: none;
    }
  </style>
</head>

<body>
  <div id="app">Loading...</div>
  <script>
    window.$docsify = {
      name: 'GHL Training',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 1,
      coverpage: true,
      themeColor: '#175ddc',
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search...',
        noData: 'No Results found',
        depth: 3
      }
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Plugins -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
